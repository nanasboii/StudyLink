services:
  app:
    build: .
    container_name: studylink-app
    ports:
      - "6767:6767"
    env_file:
      - .env
    environment:
      PORT: 6767
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: ${DB_SSL}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED}
      SKIP_DB_INIT: ${SKIP_DB_INIT}
    volumes:
      - app_uploads:/app/src/uploads
    restart: unless-stopped

volumes:
  app_uploads:
