services:
  app:
    build: .
    container_name: studylink-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: studylink
      DB_PASSWORD: studylink
      DB_NAME: studylink
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_uploads:/app/src/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: studylink-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: studylink
      POSTGRES_PASSWORD: studylink
      POSTGRES_DB: studylink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studylink -d studylink"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: studylink-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@studylink.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  app_uploads:
