<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Session</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/session.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <h2 id="sessionPageTitle">Manage Session</h2>

          <form id="availabilityForm" class="stack card hidden">
            <label>Course Code
              <input name="courseCode" placeholder="TMF3953" />
            </label>
            <label>Day of Week
              <select name="dayOfWeek" required>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
              </select>
            </label>
            <div class="row-2">
              <label>Start
                <input type="time" name="startTime" required />
              </label>
              <label>End
                <input type="time" name="endTime" required />
              </label>
            </div>
            <button class="primary" type="submit">Update Session</button>
          </form>

          <form id="bookingForm" class="stack card hidden">
            <p class="meta">Tip: Use the tutor's matric number from the Tutor page, or pick one below in "Recent Available Tutors".</p>
            <label>Tutor Matric Number
              <input type="text" name="tutorId" required />
            </label>
            <label>Course Code
              <input name="courseCode" placeholder="TMF3953" />
            </label>
            <label>Session Time
              <input type="datetime-local" name="sessionTime" required />
            </label>
            <button class="primary" type="submit">Send Booking</button>
          </form>

          <div id="recentTutorsCard" class="card hidden">
            <h3>Recent Available Tutors</h3>
            <div id="recentTutorsList" class="list"></div>
          </div>

          <div class="card">
            <h3>My Requests</h3>
            <div id="bookingList" class="list"></div>
          </div>
          <p id="sessionMessage" class="message"></p>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/session.js"></script>
  </body>
</html>
