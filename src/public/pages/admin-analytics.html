<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Admin Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <style>
      .analytics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }

      .stat-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 16px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .stat-card.users {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .stat-card.tutors {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }

      .stat-card.bookings {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      }

      .stat-card.resources {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      }

      .stat-card.points {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      }

      .stat-card.badges {
        background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
      }

      .stat-card h3 {
        margin: 0;
        font-size: 12px;
        opacity: 0.9;
        font-weight: 500;
      }

      .stat-card .number {
        font-size: 32px;
        font-weight: 700;
        margin: 8px 0 0 0;
      }

      .section {
        margin-top: 24px;
      }

      .section h2 {
        font-size: 16px;
        margin: 0 0 12px 0;
        color: #333;
      }

      .list {
        background: white;
        border-radius: 8px;
        overflow: hidden;
      }

      .item {
        padding: 12px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .item:last-child {
        border-bottom: none;
      }

      .item-label {
        font-size: 12px;
        color: #666;
      }

      .item-value {
        font-size: 18px;
        font-weight: 600;
        color: #333;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #eee;
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 4px;
      }

      @media (max-width: 600px) {
        .analytics-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <div class="search-row">
            <h2>Analytics Dashboard</h2>
            <button id="refreshBtn" class="chip" type="button">Refresh</button>
          </div>

          <div class="analytics-grid">
            <div class="stat-card users">
              <h3>Total Users</h3>
              <div class="number" id="totalUsers">0</div>
            </div>
            <div class="stat-card tutors">
              <h3>Verified Tutors</h3>
              <div class="number" id="verifiedTutors">0</div>
            </div>
            <div class="stat-card bookings">
              <h3>Active Bookings</h3>
              <div class="number" id="activeBookings">0</div>
            </div>
            <div class="stat-card resources">
              <h3>Total Resources</h3>
              <div class="number" id="totalResources">0</div>
            </div>
            <div class="stat-card points">
              <h3>Total Points</h3>
              <div class="number" id="totalPoints">0</div>
            </div>
            <div class="stat-card badges">
              <h3>Badges Unlocked</h3>
              <div class="number" id="totalBadges">0</div>
            </div>
          </div>

          <div class="section">
            <h2>Top Contributors</h2>
            <div id="topContributors" class="list"></div>
          </div>

          <div class="section">
            <h2>Points Distribution</h2>
            <div id="pointsDistribution" class="list"></div>
          </div>

          <p id="adminMessage" class="message"></p>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/admin-analytics.js"></script>
  </body>
</html>
