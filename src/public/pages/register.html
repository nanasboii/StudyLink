<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/register.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header class="topbar"><h1>StudyLink - Create Account</h1></header>
        <div class="view auth-view">
          <div class="auth-block">
            <h2>Enter personal info</h2>
            <form id="registerForm" class="stack">
              <label>Register as
                <select name="role" required>
                  <option value="">Select</option>
                  <option value="tutee">Tutee</option>
                  <option value="tutor">Tutor</option>
                </select>
              </label>
              <div class="row-2">
                <label>First Name
                  <input name="firstName" required />
                </label>
                <label>Last Name
                  <input name="lastName" required />
                </label>
              </div>
              <label>Student ID
                <input name="studentId" required />
              </label>
              <label>Phone Number
                <input name="phoneNumber" />
              </label>
              <label>Email Address
                <input type="email" name="email" required />
              </label>
              <label>Major
                <input name="major" />
              </label>
              <label>Year of Study
                <input type="number" min="1" max="7" name="yearOfStudy" />
              </label>
              <label id="targetSubjectsRow">Target Subjects (for tutee)
                <input name="targetSubjects" placeholder="e.g. Database, Algorithms" />
              </label>
              <label id="expertiseRow" class="hidden">Expertise (for tutor)
                <input name="expertise" placeholder="e.g. Java, SQL, Computer Graphics" />
              </label>
              <label>Bio
                <textarea name="bio" rows="3" placeholder="Short intro"></textarea>
              </label>
              <label>Password
                <input type="password" name="password" minlength="8" required />
              </label>
              <label>Verify Password
                <input type="password" name="confirmPassword" minlength="8" required />
              </label>
              <button class="primary" type="submit">Create Account</button>
            </form>
            <a class="link-btn" href="/ui/pages/login.html">Back to login</a>
            <p id="registerMessage" class="message"></p>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/register.js"></script>
  </body>
</html>
