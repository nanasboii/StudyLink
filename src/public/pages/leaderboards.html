<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Leaderboards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/leaderboards.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <div class="search-row">
            <button id="badgeGalleryBtn" class="chip" type="button">Badge Gallery</button>
            <h2>Leaderboards</h2>
            <button id="refreshBtn" class="chip" type="button">Refresh</button>
          </div>
          <div id="leaderboardList" class="list"></div>
          <section id="badgePanel" class="card badge-panel">
            <div class="search-row compact">
              <h3>Your Badges</h3>
              <span class="meta">Learning Points unlock badges as you help others.</span>
            </div>
            <div id="badgeList" class="badge-grid"></div>
            <section id="badgeDetail" class="badge-detail hidden" aria-live="polite"></section>
          </section>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/leaderboards.js"></script>
  </body>
</html>
