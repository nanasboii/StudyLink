<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Resource Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/resource-detail.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <div class="resource-detail-header">
            <div>
              <p class="resource-detail-kicker">Learning Resource</p>
              <h2 id="resourceTitle">Resource Detail</h2>
            </div>
            <button id="backToResourcesBtn" class="chip" type="button">Back to Resources</button>
          </div>

          <section id="resourceDetailCard" class="card resource-detail-card hidden">
            <div class="resource-detail-cover">
              <span id="resourceTypeTag" class="resource-type-tag">Resource</span>
              <p id="resourceContributor" class="resource-contributor">Uploaded by -</p>
            </div>

            <div class="resource-detail-main">
              <div class="resource-detail-meta-grid">
                <div class="resource-meta-box">
                  <span>Course</span>
                  <strong id="resourceCourse">-</strong>
                </div>
                <div class="resource-meta-box">
                  <span>Average Rating</span>
                  <strong id="resourceRating">0.0</strong>
                </div>
                <div class="resource-meta-box">
                  <span>Total Reviews</span>
                  <strong id="resourceReviewCount">0</strong>
                </div>
                <div class="resource-meta-box">
                  <span>Published</span>
                  <strong id="resourceCreatedAt">-</strong>
                </div>
              </div>

              <p id="resourceSource" class="resource-source-line">Source: -</p>

              <div class="resource-action-row">
                <button id="openResourceBtn" class="chip chip-strong" type="button">Open Resource</button>
                <button id="downloadResourceBtn" class="chip" type="button">Download</button>
              </div>
            </div>
          </section>

          <section class="card resource-rating-card">
            <h3>Rate This Resource</h3>
            <form id="resourceReviewForm" class="stack">
              <div class="detail-star-rating-wrap">
                <p class="detail-rating-label">Your rating</p>
                <div id="resourceRatingInput" class="detail-star-rating" role="radiogroup" aria-label="Your rating">
                  <button type="button" data-rating="1" aria-label="Rate 1 star" aria-pressed="false">★</button>
                  <button type="button" data-rating="2" aria-label="Rate 2 stars" aria-pressed="false">★</button>
                  <button type="button" data-rating="3" aria-label="Rate 3 stars" aria-pressed="false">★</button>
                  <button type="button" data-rating="4" aria-label="Rate 4 stars" aria-pressed="false">★</button>
                  <button type="button" data-rating="5" aria-label="Rate 5 stars" aria-pressed="false">★</button>
                </div>
                <p id="detailRatingHint" class="meta">Select rating</p>
              </div>
              <label>Comment (optional)
                <textarea id="resourceCommentInput" rows="3" placeholder="Share what was useful about this resource"></textarea>
              </label>
              <button class="primary" type="submit">Submit Rating</button>
            </form>
            <p id="resourceReviewMessage" class="message"></p>
          </section>

          <section class="card resource-comments-card">
            <div class="resource-comments-head">
              <h3>Comments & Ratings</h3>
              <button id="refreshCommentsBtn" class="chip" type="button">Refresh</button>
            </div>
            <div id="resourceCommentsList" class="resource-comments-list"></div>
          </section>

          <p id="resourceDetailMessage" class="message"></p>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/resource-detail.js"></script>
  </body>
</html>
