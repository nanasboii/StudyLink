<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/review.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <h2>Leave Review</h2>
          <div class="card">
            <div class="search-row">
              <h3>Completed Sessions Ready for Review</h3>
              <button id="refreshCompletedBtn" class="chip" type="button">Refresh</button>
            </div>
            <div id="completedBookingsList" class="list"></div>
          </div>
          <form id="reviewForm" class="stack card">
            <p class="meta">Tip: Select a completed booking below so the Booking ID is correct.</p>
            <label>Booking ID
              <input type="number" name="bookingId" required />
            </label>
            <label>Comment
              <textarea name="comment" rows="4" maxlength="250"></textarea>
            </label>
            <label>Rating (1-5)
              <input type="number" min="1" max="5" name="rating" required />
            </label>
            <button class="primary" type="submit">Submit</button>
          </form>
          <p id="reviewMessage" class="message"></p>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/review.js"></script>
  </body>
</html>
