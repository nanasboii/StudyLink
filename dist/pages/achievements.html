<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Achievements</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/achievements.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <div class="achievements-header">
            <h2>Achievements</h2>
            <div class="points-display">
              <span class="points-label">Total Points:</span>
              <span class="points-value" id="totalPoints">0</span>
            </div>
          </div>

          <section class="card achievements-summary">
            <div class="summary-tile">
              <div class="summary-label">Unlocked</div>
              <div class="summary-value" id="unlockedCount">0</div>
            </div>
            <div class="summary-tile">
              <div class="summary-label">Locked</div>
              <div class="summary-value" id="lockedCount">0</div>
            </div>
            <div class="summary-tile">
              <div class="summary-label">Next Target</div>
              <div class="summary-value" id="nextTarget">-</div>
            </div>
          </section>

          <section class="achievements-section card">
            <h3>Your Achievements</h3>
            <div id="badgesContainer" class="badges-grid"></div>
          </section>

          <section class="progress-section card">
            <h3>Achievement Progress</h3>
            <div id="progressContainer" class="progress-list"></div>
          </section>

          <p id="achievementsMessage" class="message"></p>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/achievements.js"></script>
  </body>
</html>
