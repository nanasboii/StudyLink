<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyLink - Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ui/css/base.css" />
    <link rel="stylesheet" href="/ui/css/pages/verification.css" />
  </head>
  <body>
    <main class="page-bg">
      <section class="phone-shell">
        <header id="topbar" class="topbar"></header>
        <div class="view page active">
          <h2>Upload Documents for Verification</h2>
          <form id="verifyForm" class="stack card">
            <label>Course Code
              <input name="courseCode" placeholder="TMF3953" />
            </label>
            <p class="meta">Tip: enter any course code you teach (e.g., TMF3953, CS101, MATH2020).</p>
            <label>Verification File
              <input
                type="file"
                name="document"
                accept=".pdf,.doc,.docx,image/png,image/jpeg"
                required
              />
            </label>
            <p class="meta">Allowed: PDF, DOC, DOCX, PNG, JPEG. Max size: 10MB.</p>
            <button class="primary" type="submit">Submit for Verification</button>
          </form>
          <p id="verifyMessage" class="message"></p>

          <section class="card app-section">
            <div class="search-row">
              <h3>My Latest Applications</h3>
              <button id="refreshApplicationsBtn" class="chip" type="button">Refresh</button>
            </div>
            <div id="myApplicationsList" class="list"></div>
          </section>

          <section class="card app-section">
            <div class="search-row">
              <h3>Recent Verification Notifications</h3>
              <button id="refreshNotificationsBtn" class="chip" type="button">Refresh</button>
            </div>
            <div id="verificationNotificationsList" class="list"></div>
          </section>
        </div>
        <nav id="bottomNav" class="bottom-nav"></nav>
      </section>
    </main>
    <script type="module" src="/ui/js/pages/verification.js"></script>
  </body>
</html>
